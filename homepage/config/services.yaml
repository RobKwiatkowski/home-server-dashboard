- Apps:
    - Quiz:
        href: http://myhouse.local:8081
        description: Aplikacja edukacyjna
        icon: mdi-school

    - Notes:
        href: http://myhouse.local:8082
        description: Aplikacja notatek
        icon: mdi-note-text

    - Caddy test:
        href: http://myhouse.local/whoami
        description: Test reverse proxy
        icon: mdi-server

    - Portainer:
        href: http://myhouse.local:9000
        description: Docker management UI
        icon: portainer
        widget:
          type: portainer
          url: http://portainer:9000
          env: "{{HOMEPAGE_VAR_PORTAINER_ENV_ID}}"
          key: "{{HOMEPAGE_VAR_PORTAINER_API_KEY}}"
          fields: ["running", "stopped", "total"]

    - Glances:
        href: http://myhouse.local:61208
        description: RPi system metrics
        icon: mdi-chart-line

- System:
    - Raspberry Pi IP:
        href: http://myhouse.local
        description: Aktualny adres serwera
        icon: mdi-ip-network
        widget:
          type: customapi
          url: http://host.docker.internal:8099
          refreshInterval: 30000
          mappings:
            - field: primary_ip
              label: IP
              format: text
            - field: quiz_url
              label: Quiz
              format: text
            - field: hostname_I
              label: hostname -I
              format: text

    - CPU:
        icon: mdi-cpu-64-bit
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: cpu

    - Memory:
        icon: mdi-memory
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: memory

    - MySpeed:
        href: http://myhouse.local:5216
        description: Testy predkosci internetu
        icon: mdi-speedometer
        widget:
          type: myspeed
          url: http://myspeed:5216
